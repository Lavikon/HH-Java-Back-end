<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Book Form</title>
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />
</head>

<body>
    <div class="container">
        <h1>Book Form</h1>

        <form th:action="@{/save}" th:object="${book}" method="post">

            <input type="hidden" th:field="*{id}" />

            Title: <input type="text" th:field="*{title}" /><br><br>
            Author: <input type="text" th:field="*{author}" /><br><br>
            Year: <input type="number" th:field="*{year}" /><br><br>
            ISBN: <input type="text" th:field="*{isbn}" /><br><br>
            Price: <input type="number" step="0.01" th:field="*{price}" /><br><br>
            Category: <select th:field="*{category}">
                <option th:each="category : ${categories}" th:value="${category.categoryid}" th:text="${category.name}">
                </option>
            </select><br><br>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>

        <p><a th:href="@{/booklist}">Back to list</a></p>
    </div>
</body>

</html>
